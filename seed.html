window.seedDB = async function() {
  const btn = document.getElementById('btn');
  const log = document.getElementById('log');
  btn.disabled = true;
  log.innerHTML = '';
  
  const add = (msg, cls='') => { log.innerHTML += `<div class="${cls}">${msg}</div>`; log.scrollTop=log.scrollHeight; };
  
  try {
    add('📂 إضافة الأقسام...');
    for(const cat of categories) {
      await setDoc(doc(db,'categories',cat.id), cat);
      add(`✅ ${cat.name}`, 'success');
    }
    
    add('🍽️ إضافة الأصناف...');
    for(const item of menuItems) {
      await addDoc(collection(db,'menu'), item);
      add(`✅ ${item.name}`, 'success');
    }
    
    add('🎉 تم! 10 أقسام و 51 صنف مضافين بنجاح', 'success');
    btn.innerHTML = '✅ تم بنجاح!';
  } catch(e) {
    add('❌ خطأ: '+e.message, 'err');
    btn.disabled = false;
  }
};
